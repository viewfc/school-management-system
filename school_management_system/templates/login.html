{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-3">Login</h2>
                <p class="text-secondary">Sign in to access your dashboard.</p>
                <form method="post" class="vstack gap-3">
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@school.com" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                <div class="mt-3 text-secondary small">
                    Admin demo: <strong>admin@school.local</strong> / <strong>admin123</strong>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
