{% extends 'base.html' %}
{% block title %}{{ t('register') }} | {{ t('brand') }}{% endblock %}
{% block content %}
<div class="auth-grid single-column">
    <section class="card auth-card wide">
        <h2>{{ t('register') }}</h2>
        <p class="muted">{{ t('register_desc') }}</p>
        <form method="post" class="form-grid two-columns">
            <label>
                <span>{{ t('full_name') }}</span>
                <input type="text" name="full_name" placeholder="{{ t('full_name') }}" required>
            </label>
            <label>
                <span>{{ t('email') }}</span>
                <input type="email" name="email" placeholder="you@school.com" required>
            </label>
            <label>
                <span>{{ t('role') }}</span>
                <select name="role">
                    <option value="student">{{ t('student') }}</option>
                    <option value="teacher">{{ t('teacher') }}</option>
                </select>
            </label>
            <label>
                <span>{{ t('password') }}</span>
                <input type="password" name="password" minlength="6" required>
            </label>
            <label>
                <span>{{ t('confirm_password') }}</span>
                <input type="password" name="confirm_password" minlength="6" required>
            </label>
            <div class="form-actions full-width">
                <button type="submit" class="btn btn-primary">{{ t('register') }}</button>
                <a href="{{ url_for('login') }}" class="btn btn-outline">{{ t('go_to_login') }}</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
