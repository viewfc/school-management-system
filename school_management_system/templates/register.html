{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h2 class="fw-bold mb-3">Register</h2>
                <p class="text-secondary">Create a teacher or student account.</p>
                <form method="post" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" required>
                            <option value="">Choose role</option>
                            <option value="teacher">Teacher</option>
                            <option value="student">Student</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Grade level (student)</label>
                        <input type="text" name="grade_level" class="form-control" placeholder="Grade 10">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Section (student)</label>
                        <input type="text" name="section" class="form-control" placeholder="A">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Department (teacher)</label>
                        <input type="text" name="department" class="form-control" placeholder="Science Department">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary">Create account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
